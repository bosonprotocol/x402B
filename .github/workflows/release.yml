name: Release

# Single workflow for both publish flows so npm's trusted-publisher
# binding (repo + workflow filename) covers them under one config:
#   - push to main          -> alpha publish (snapshot, no version bump)
#   - workflow_dispatch     -> latest publish (consumes queued changesets,
#                              commits bumps, creates per-package GitHub
#                              Releases).
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm format:check

      # ---------------- alpha (push to main) ----------------
      - name: Publish alpha
        if: github.event_name == 'push'
        run: pnpm publish:alpha

      # ---------------- latest (workflow_dispatch) ----------
      - name: Configure git identity
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Consume changesets (bump versions + CHANGELOG)
        if: github.event_name == 'workflow_dispatch'
        run: pnpm exec changeset version

      - name: Fail if no changesets were queued
        if: github.event_name == 'workflow_dispatch'
        run: |
          if git diff --quiet; then
            echo "::error::No queued changesets — nothing to release."
            exit 1
          fi

      - name: Commit and push version bumps
        if: github.event_name == 'workflow_dispatch'
        run: |
          git add .
          git commit -m "chore(release): version packages"
          git push origin HEAD:main

      - name: Publish latest + create per-package GitHub Releases
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm publish:latest
